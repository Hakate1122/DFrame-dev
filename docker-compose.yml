services:

  dframe-app:
    build: .
    container_name: dframe_backend
    restart: always
    volumes:
      - .:/var/www/html
    networks:
      - dframe_network

  dframe-nginx:
    image: nginx:alpine
    container_name: dframe_web
    restart: always
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - dframe-app
    networks:
      - dframe_network

networks:
  dframe_network:
    driver: bridge